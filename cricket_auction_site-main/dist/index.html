        body {
            font-family: 'Inter', sans-serif;
            background-color: #040d0a;
            color: #f1f5f9;
            overflow-x: hidden;
        }
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }
        /* Stadium Broadcast Aesthetic */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .stadium-gradient {
            background: radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.15) 0%, transparent 70%),
                        linear-gradient(to bottom, #040d0a, #020617);
        }
        .hover-float {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hover-float:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
        }
        .broadcast-border {
            border-left: 4px solid #10b981;
        }
        @keyframes floodlight {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .animate-floodlight {
            animation: floodlight 4s ease-in-out infinite;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #040d0a; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
